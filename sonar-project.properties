# Required: set SONAR_TOKEN and SONAR_HOST_URL as environment variables (see .env)
# Run: pnpm sonar

sonar.projectKey=kollabglobal
sonar.projectName=KOLLAB Global
sonar.projectVersion=0.1.0

# Source and test directories
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=src/**/__tests__/**,src/**/*.test.ts,src/**/*.test.tsx

# Exclusions
sonar.exclusions=\
  src/generated/**,\
  **/.next/**,\
  **/node_modules/**,\
  **/coverage/**,\
  prisma/**,\
  scripts/**

# Coverage — run `pnpm test:coverage` first to generate lcov.info
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# TypeScript
sonar.typescript.tsconfigPath=tsconfig.json

# Encoding
sonar.sourceEncoding=UTF-8

# Host and token come from env vars — set in .env then run: pnpm sonar
# SONAR_HOST_URL  — https://sonarcloud.io  OR  http://localhost:9000
# SONAR_TOKEN     — token from SonarCloud/SonarQube dashboard

# SonarCloud only: your org key
# sonar.organization=<your-org-key>
